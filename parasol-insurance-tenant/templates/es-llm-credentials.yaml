{{- $prefix := include "parasol-insurance-tenant.prefix" . -}}
{{- range $env := list "dev" "prod" }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: llm-credentials
  namespace: {{ $prefix }}-{{ $env }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  data:
    - secretKey: api-url
      remoteRef:
        key: secrets/litellm
        property: apiUrl
    - secretKey: api-key
      remoteRef:
        key: secrets/litellm
        property: apiKey
  target:
    name: llm-credentials
    creationPolicy: Owner
{{- end }}
