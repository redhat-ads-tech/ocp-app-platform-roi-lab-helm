apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "parasol-insurance-tenant.prefix" . }}-pipeline-triggers
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openshift-pipelines-clusterinterceptors
subjects:
  - kind: ServiceAccount
    name: parasol-insurance-build
    namespace: {{ include "parasol-insurance-tenant.prefix" . }}-build
  - kind: ServiceAccount
    name: pipeline
    namespace: {{ include "parasol-insurance-tenant.prefix" . }}-build
