kind: ConfigMap
metadata:
  name: rhdh-templates-config
  annotations:
    argocd.argoproj.io/sync-wave: "0"
apiVersion: v1
data:
  playbook.yaml: |
    ---
    - name: Configure RHDH templates with infrastructure values
      hosts: localhost
      tasks:
        - name: Wait for rhdh-templates GitLab project
          ansible.builtin.uri:
            url: "https://{{ $.Values.gitlab.host }}/api/v4/projects/rhdh%2Frhdh-templates"
            method: GET
            headers:
              PRIVATE-TOKEN: "{{ "{{" }} lookup('env', 'GITLAB_TOKEN') {{ "}}" }}"
            validate_certs: false
          register: r_project
          retries: 60
          delay: 10
          until: r_project.status == 200

        - name: Clone rhdh-templates repo
          ansible.builtin.git:
            repo: "https://root:{{ "{{" }} lookup('env', 'GITLAB_TOKEN') {{ "}}" }}@{{ $.Values.gitlab.host }}/rhdh/rhdh-templates.git"
            dest: /tmp/rhdh-templates
            version: main
          environment:
            GIT_SSL_NO_VERIFY: "true"

        - name: Replace __GITLAB_HOST__ placeholder
          ansible.builtin.replace:
            path: /tmp/rhdh-templates/templates/parasol-insurance-secured/template.yaml
            regexp: '__GITLAB_HOST__'
            replace: '{{ $.Values.gitlab.host }}'

        - name: Replace __REGISTRY_HOST__ placeholder
          ansible.builtin.replace:
            path: /tmp/rhdh-templates/templates/parasol-insurance-secured/template.yaml
            regexp: '__REGISTRY_HOST__'
            replace: '{{ $.Values.registry.host }}'

        - name: Replace __CLUSTER_SUBDOMAIN__ placeholder
          ansible.builtin.replace:
            path: /tmp/rhdh-templates/templates/parasol-insurance-secured/template.yaml
            regexp: '__CLUSTER_SUBDOMAIN__'
            replace: '{{ $.Values.cluster.subdomain }}'

        - name: Replace __GITOPS_NAMESPACE__ placeholder
          ansible.builtin.replace:
            path: /tmp/rhdh-templates/templates/parasol-insurance-secured/template.yaml
            regexp: '__GITOPS_NAMESPACE__'
            replace: '{{ $.Values.argocd.namespace }}'

        - name: Check for changes
          ansible.builtin.command:
            cmd: git diff --quiet
            chdir: /tmp/rhdh-templates
          register: r_diff
          failed_when: false
          changed_when: false

        - name: Commit and push changes
          ansible.builtin.shell: |
            cd /tmp/rhdh-templates
            git config user.email "platform-engineering@parasol-insurance.local"
            git config user.name "Platform Engineering"
            git add -A
            git commit -m "chore: inject infrastructure values into templates"
            git push origin main
          environment:
            GIT_SSL_NO_VERIFY: "true"
          when: r_diff.rc != 0
