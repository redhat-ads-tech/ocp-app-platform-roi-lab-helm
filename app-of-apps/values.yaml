gitops:
  repoURL: https://github.com/redhat-ads-tech/ocp-app-platform-demo-helm.git
  targetRevision: main

argocd:
  namespace: openshift-gitops

# Operator version pinning via custom CatalogSource.
# When enabled, a snapshot of the Red Hat operator catalog is deployed
# and all operator subscriptions use it instead of the live catalog.
catalogSource:
  enabled: false
  name: redhat-operators-snapshot
  namespace: openshift-marketplace
  image: quay.io/gpte-devops-automation/olm_snapshot_redhat_catalog
  tag: v4.20_2026_02_11
  displayName: "Red Hat Operators (Snapshot)"
  publisher: "Red Hat Demo Platform"

cluster:
  subdomain: ""
  apiServer: ""

common:
  password: ""

vault:
  name: vault
  namespace: vault
  authNamespace: default
  secrets:
    gitlab:
      rootPassword: ""
    common:
      password: ""
    litellm:
      apiUrl: ""
      apiKey: ""
    sonarqube:
      adminPassword: ""
    kafka:
      userPassword: ""

externalSecrets:
  name: external-secrets
  namespace: external-secrets

openshiftPipelines:
  name: openshift-pipelines
  namespace: openshift-operators

noobaa:
  enabled: true
  name: noobaa
  namespace: openshift-storage

gitlab:
  name: gitlab
  namespace: gitlab
  host: ""
  smtp:
    host: ""
  ssh:
    host: ""
  rootPassword: ""
  usersPassword: ""
  cluster:
    subdomain: ""

quay:
  name: quay
  namespace: quay-registry
  host: ""
  adminUser: quayadmin
  adminUserPassword: ""
  organizations:
    - parasol
  users: []

kubernetesImagepuller:
  name: kubernetes-imagepuller
  namespace: openshift-operators

devspaces:
  enabled: true
  name: devspaces
  namespace: openshift-devspaces

amqStreams:
  enabled: true
  name: amq-streams
  namespace: kafka

openvsx:
  name: openvsx
  namespace: che-openvsx

sonarqube:
  name: sonarqube
  namespace: sonarqube
